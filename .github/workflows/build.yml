name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=VoidBreaker, OU=Game, O=VoidBreaker, L=Unknown, S=Unknown, C=US" || true

      - name: Build Release APK
        run: |
          cd android
          gradle assembleRelease --stacktrace --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/VoidBreaker.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoidBreaker-APK
          path: output/VoidBreaker.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "VOID BREAKER v${{ github.run_number }}"
          body: |
            ## 🎮 VOID BREAKER

            Автоматическая сборка APK.

            Build #${{ github.run_number }}
          files: output/VoidBreaker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
